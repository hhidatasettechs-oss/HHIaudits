name: Governance Checksum Validation

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  checksum:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Find and verify all checksum files
        run: |
          set -e

          echo "Searching for checksum files..."

          FILES=$(find . -type f -name "*.sha256")

          if [ -z "$FILES" ]; then
            echo "No checksum files found"
            exit 0
          fi

          for file in $FILES; do
            echo "----------------------------------"
            echo "Validating: $file"

            DIR=$(dirname "$file")
            cd "$DIR"

            sha256sum -c $(basename "$file")

            cd - > /dev/null
          done

          echo "----------------------------------"
          echo "All checksum files validated"
